services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d user_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  user-service:
    build: .
    image: user-service:local
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_service
      SERVER_PORT: 8081
    expose:
      - "8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health/readiness | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
