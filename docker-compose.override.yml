# Local-dev-only overrides. Compose auto-loads this file next to docker-compose.yml.
# The deploy workflow excludes it from the rsync so production does NOT get these mappings.
#
# Why: the production droplet already has another Postgres bound to host port 5433
# (auth-service's DB), so we do not expose this Postgres on the host in production.
# Locally it is convenient to connect from the host (psql, IDE, ./mvnw spring-boot:run).

services:
  postgres:
    ports:
      - "5433:5432"
